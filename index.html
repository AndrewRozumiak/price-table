<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Таблиця цін — Fetch API</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="pricing.css" />
  <link rel="stylesheet" href="dom.css" />
  <link rel="stylesheet" href="fetch.css" />
</head>
<body>

  <!-- ===== ШАПКА ===== -->
  <header class="site-header">
    <div class="header-inner">
      <h1>УкрМедіа — Тарифні плани</h1>
      <p>Оберіть план, що підходить саме вам</p>
    </div>
  </header>

  <main class="pricing-wrapper">

    <div class="section-title">
      <h2>Прості та прозорі ціни</h2>
      <p>Без прихованих платежів. Змініть або скасуйте будь-коли.</p>
    </div>

    <!-- ===== ПЕРЕМИКАЧ ===== -->
    <div class="billing-toggle" role="group" aria-label="Період оплати">
      <button class="toggle-btn active" id="btn-monthly" aria-pressed="true" data-period="monthly">
        Місячна оплата
      </button>
      <button class="toggle-btn" id="btn-yearly" aria-pressed="false" data-period="yearly">
        Річна оплата
        <span class="discount-badge">−20%</span>
      </button>
    </div>

    <!-- ===== SKELETON / LOADER (показується до завантаження JSON) ===== -->
    <div id="skeleton-grid" class="pricing-grid">
      <div class="skeleton-card"><div class="skeleton-line h40"></div><div class="skeleton-line h20"></div><div class="skeleton-line h20 w60"></div><div class="skeleton-line h14"></div><div class="skeleton-line h14 w80"></div><div class="skeleton-line h14 w70"></div><div class="skeleton-line h40 mt"></div></div>
      <div class="skeleton-card"><div class="skeleton-line h40"></div><div class="skeleton-line h20"></div><div class="skeleton-line h20 w60"></div><div class="skeleton-line h14"></div><div class="skeleton-line h14 w80"></div><div class="skeleton-line h14 w70"></div><div class="skeleton-line h40 mt"></div></div>
      <div class="skeleton-card"><div class="skeleton-line h40"></div><div class="skeleton-line h20"></div><div class="skeleton-line h20 w60"></div><div class="skeleton-line h14"></div><div class="skeleton-line h14 w80"></div><div class="skeleton-line h14 w70"></div><div class="skeleton-line h40 mt"></div></div>
    </div>

    <!-- ===== СІТКА КАРТОК (заповнюється JS після Fetch) ===== -->
    <div id="pricing-grid" class="pricing-grid" hidden aria-live="polite"></div>

    <!-- ===== ПОВІДОМЛЕННЯ ПРО ПОМИЛКУ FETCH ===== -->
    <div class="fetch-error" id="fetch-error" hidden role="alert">
      <span id="fetch-error-text"></span>
      <button class="btn-retry" id="btn-retry" type="button">🔄 Повторити запит</button>
    </div>

    <!-- ===== OVERLAY завантаження (вибір тарифу) ===== -->
    <div class="loading-overlay" id="loading-overlay" hidden role="status" aria-live="assertive">
      <div class="loading-spinner"></div>
      <p class="loading-text" id="loading-text">Обробка запиту...</p>
    </div>

    <!-- ===== БЛОК ПІДТВЕРДЖЕННЯ ===== -->
    <div id="confirmation-area"></div>

    <!-- ===== ПОРІВНЯЛЬНА ТАБЛИЦЯ (заповнюється JS) ===== -->
    <section class="compare-section" id="compare-section" hidden>
      <h3>Порівняння тарифів</h3>
      <div id="compare-table-wrap"></div>
    </section>

    <!-- ===== JS-ЛОГ ===== -->
    <section class="js-log-section">
      <h3>📋 Fetch API / async-await — лог запитів</h3>
      <div class="js-log" id="js-log" aria-live="polite"></div>
      <button class="clear-log-btn" id="clear-log" type="button">Очистити лог</button>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 УкрМедіа. Лабораторна робота №06 — Fetch API, Варіант 5.</p>
  </footer>

  <!-- Підключаємо модулі: dom.js (з ЛР05) + fetch.js (новий) -->
  <script src="fetch.js" type="module"></script>
</body>
</html>
